<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2410"/>
      <stop offset="50%" stop-color="#171d0c"/>
      <stop offset="100%" stop-color="#0e1308"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3a3318" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3a3318" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1800" fill="url(#dusk)"/>
  <ellipse cx="600" cy="700" rx="500" ry="500" fill="url(#glow)"/>

  <!-- blurred leaves, foreground & background -->
  <g fill="#26331a" opacity="0.55">
    <ellipse cx="150" cy="200" rx="220" ry="140" transform="rotate(-20 150 200)"/>
    <ellipse cx="1050" cy="250" rx="260" ry="170" transform="rotate(15 1050 250)"/>
    <ellipse cx="980" cy="650" rx="240" ry="160" transform="rotate(35 980 650)"/>
    <ellipse cx="120" cy="900" rx="260" ry="180" transform="rotate(-30 120 900)"/>
    <ellipse cx="950" cy="1150" rx="280" ry="190" transform="rotate(10 950 1150)"/>
    <ellipse cx="250" cy="1500" rx="300" ry="200" transform="rotate(-15 250 1500)"/>
    <ellipse cx="900" cy="1650" rx="320" ry="210" transform="rotate(20 900 1650)"/>
  </g>
  <g fill="#1a2410" opacity="0.5">
    <ellipse cx="600" cy="100" rx="320" ry="160" transform="rotate(5 600 100)"/>
    <ellipse cx="60" cy="600" rx="220" ry="300" transform="rotate(-10 60 600)"/>
    <ellipse cx="1140" cy="900" rx="220" ry="320" transform="rotate(8 1140 900)"/>
  </g>

  <!-- branch -->
  <g stroke="#100c06" stroke-width="22" fill="none" opacity="0.85">
    <path d="M -50,1300 C 300,1180 500,1180 700,1100"/>
    <path d="M 700,1100 C 760,1080 850,1060 1000,1000"/>
  </g>

  <!-- ============ OWL ============ -->
  <g transform="translate(600,820)" opacity="0.92">

    <!-- ear tufts (prominent, long-eared owl signature) -->
    <path d="M -150,-260 C -170,-340 -130,-430 -90,-470 C -110,-380 -90,-300 -55,-230 Z" fill="#3a2d18"/>
    <path d="M 150,-260 C 170,-340 130,-430 90,-470 C 110,-380 90,-300 55,-230 Z" fill="#3a2d18"/>
    <path d="M -130,-250 C -145,-320 -115,-395 -85,-430 C -100,-355 -85,-290 -55,-230 Z" fill="#5a472a"/>
    <path d="M 130,-250 C 145,-320 115,-395 85,-430 C 100,-355 85,-290 55,-230 Z" fill="#5a472a"/>

    <!-- body -->
    <ellipse cx="0" cy="260" rx="200" ry="280" fill="#4a3a22"/>
    <ellipse cx="0" cy="300" rx="150" ry="220" fill="#6b5535"/>

    <!-- feather streak texture on body -->
    <g stroke="#3a2d18" stroke-width="6" opacity="0.5" fill="none">
      <path d="M -90,150 C -100,250 -90,380 -70,470"/>
      <path d="M -30,140 C -40,260 -30,400 -10,500"/>
      <path d="M 30,140 C 40,260 30,400 10,500"/>
      <path d="M 90,150 C 100,250 90,380 70,470"/>
    </g>

    <!-- facial disc -->
    <circle cx="0" cy="0" r="190" fill="#cdb27a"/>
    <circle cx="0" cy="0" r="190" fill="none" stroke="#5a472a" stroke-width="14" opacity="0.6"/>

    <!-- facial disc shading / mottling -->
    <g fill="#a98c5c" opacity="0.5">
      <circle cx="-120" cy="-90" r="40"/>
      <circle cx="120" cy="-90" r="40"/>
      <circle cx="-100" cy="120" r="50"/>
      <circle cx="100" cy="120" r="50"/>
      <circle cx="0" cy="150" r="55"/>
    </g>

    <!-- eyes: large, round, orange with black pupils -->
    <circle cx="-72" cy="-15" r="62" fill="#1a1208"/>
    <circle cx="72" cy="-15" r="62" fill="#1a1208"/>
    <circle cx="-72" cy="-15" r="50" fill="#c97a2e"/>
    <circle cx="72" cy="-15" r="50" fill="#c97a2e"/>
    <circle cx="-72" cy="-15" r="26" fill="#0c0804"/>
    <circle cx="72" cy="-15" r="26" fill="#0c0804"/>
    <circle cx="-82" cy="-28" r="9" fill="#f0e6cf" opacity="0.7"/>
    <circle cx="62" cy="-28" r="9" fill="#f0e6cf" opacity="0.7"/>

    <!-- brow ridges -->
    <path d="M -130,-65 C -100,-90 -50,-90 -25,-60" stroke="#5a472a" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M 130,-65 C 100,-90 50,-90 25,-60" stroke="#5a472a" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- beak -->
    <path d="M -22,55 L 22,55 L 0,100 Z" fill="#3a2d18"/>

    <!-- inner ear tuft accents over disc edge -->
    <path d="M -150,-200 C -160,-250 -140,-310 -110,-340 C -120,-280 -110,-230 -90,-190 Z" fill="#cdb27a" opacity="0.4"/>
    <path d="M 150,-200 C 160,-250 140,-310 110,-340 C 120,-280 110,-230 90,-190 Z" fill="#cdb27a" opacity="0.4"/>
  </g>
</svg>
