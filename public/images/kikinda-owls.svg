<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e05"/>
      <stop offset="45%" stop-color="#2e1608"/>
      <stop offset="100%" stop-color="#120a04"/>
    </linearGradient>
    <radialGradient id="moonglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5deb3" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f5deb3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1800" fill="url(#dusk)"/>

  <!-- moon -->
  <circle cx="320" cy="280" r="220" fill="url(#moonglow)"/>
  <circle cx="320" cy="280" r="65" fill="#f7e7c1" opacity="0.3"/>

  <!-- flat plains horizon (Kikinda is famous for flat fields) -->
  <g fill="#1a0d04" opacity="0.9">
    <rect x="0" y="950" width="1200" height="850"/>
    <ellipse cx="600" cy="950" rx="900" ry="60"/>
  </g>

  <!-- distant tree line, sparse (plains) -->
  <g fill="#0f0703" opacity="0.85">
    <polygon points="0,920 60,820 120,920 700,920 760,840 820,920 1200,920 1200,1000 0,1000"/>
  </g>

  <!-- power line / branch silhouette -->
  <g stroke="#0a0502" stroke-width="6" opacity="0.9">
    <line x1="150" y1="700" x2="1100" y2="760"/>
    <line x1="150" y1="700" x2="150" y2="950"/>
    <line x1="1100" y1="760" x2="1100" y2="950"/>
  </g>

  <!-- owls perched on the line -->
  <g fill="#080402">
    <!-- owl 1 -->
    <g transform="translate(320,640)">
      <ellipse cx="0" cy="40" rx="34" ry="46"/>
      <circle cx="0" cy="0" r="30"/>
      <circle cx="-11" cy="-4" r="8" fill="#f5deb3" opacity="0.5"/>
      <circle cx="11" cy="-4" r="8" fill="#f5deb3" opacity="0.5"/>
      <polygon points="-6,8 6,8 0,18"/>
      <polygon points="-22,-26 -8,-14 -22,-8"/>
      <polygon points="22,-26 8,-14 22,-8"/>
    </g>
    <!-- owl 2 -->
    <g transform="translate(760,690) scale(1.3)">
      <ellipse cx="0" cy="40" rx="34" ry="46"/>
      <circle cx="0" cy="0" r="30"/>
      <circle cx="-11" cy="-4" r="8" fill="#f5deb3" opacity="0.5"/>
      <circle cx="11" cy="-4" r="8" fill="#f5deb3" opacity="0.5"/>
      <polygon points="-6,8 6,8 0,18"/>
      <polygon points="-22,-26 -8,-14 -22,-8"/>
      <polygon points="22,-26 8,-14 22,-8"/>
    </g>
    <!-- owl 3, smaller -->
    <g transform="translate(950,720) scale(0.8)">
      <ellipse cx="0" cy="40" rx="34" ry="46"/>
      <circle cx="0" cy="0" r="30"/>
      <circle cx="-11" cy="-4" r="8" fill="#f5deb3" opacity="0.5"/>
      <circle cx="11" cy="-4" r="8" fill="#f5deb3" opacity="0.5"/>
      <polygon points="-6,8 6,8 0,18"/>
      <polygon points="-22,-26 -8,-14 -22,-8"/>
      <polygon points="22,-26 8,-14 22,-8"/>
    </g>
  </g>
</svg>
