<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="1800" fill="#1a0e05"/>

  <g transform="translate(600,820) scale(8)">
    <!-- ear tufts -->
    <path d="M 16,16 L 24,8 L 26,22 Z" fill="#8d5524"/>
    <path d="M 48,16 L 40,8 L 38,22 Z" fill="#8d5524"/>

    <!-- body -->
    <ellipse cx="32" cy="36" rx="22" ry="24" fill="#a86b32"/>

    <!-- belly -->
    <ellipse cx="32" cy="42" rx="14" ry="16" fill="#e8c79a"/>

    <!-- face -->
    <circle cx="24" cy="28" r="10" fill="#fff6e8"/>
    <circle cx="40" cy="28" r="10" fill="#fff6e8"/>

    <!-- eyes -->
    <circle cx="24" cy="28" r="6" fill="#3a2a1a"/>
    <circle cx="40" cy="28" r="6" fill="#3a2a1a"/>
    <circle cx="22" cy="26" r="2" fill="#ffffff"/>
    <circle cx="38" cy="26" r="2" fill="#ffffff"/>

    <!-- beak -->
    <path d="M 29,34 L 35,34 L 32,42 Z" fill="#f4a623"/>

    <!-- feet -->
    <path d="M 26,58 L 26,52 M 24,58 L 28,58" stroke="#f4a623" stroke-width="2" fill="none"/>
    <path d="M 38,58 L 38,52 M 36,58 L 40,58" stroke="#f4a623" stroke-width="2" fill="none"/>
  </g>
</svg>
