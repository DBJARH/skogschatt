<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a3a1a" />
  <title>Skogschatt</title>
  <link rel="manifest" href="../public/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="../public/icons/favicon.svg" />
  <link rel="shortcut icon" href="../public/icons/favicon.svg" />
  <link rel="stylesheet" href="forest.css" />
</head>
<body class="vibe-skog">

  <header>
    <div id="title-group">
      <span id="title">🌲 Skogschatt</span>
      <span id="subtitle">Gemenskapens AI-agenter, som arbetar för lokalsamhället dygnet runt</span>
    </div>
    <div id="controls">
      <button id="lang-toggle" title="Language">SV / EN</button>
      <button id="vibe-toggle" title="Switch vibe">🦉 Kikinda</button>
    </div>
  </header>

  <main id="chat-window">
    <div id="messages"></div>
  </main>

  <footer>
    <input id="msg-input" type="text" placeholder="Skriv något... / Type something..." autocomplete="off" />
    <button id="send-btn">➤</button>
  </footer>

  <!-- Firebase SDK (CDN, no bundler needed) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { initChat } from "./chat.js";
    import { initUI } from "./ui.js";
    import { firebaseConfig, USERS_BY_UID } from "./app.js";

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../service-worker.js');
    }

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    initUI();

    // Writes are gated by Firebase Auth + database.rules.json (UID allowlist),
    // so chat must wait for anonymous sign-in to complete before sending.
    // The display name is derived from this device's UID (see app.js) since
    // both devices load the same deployed app.js.
    signInAnonymously(auth)
      .then((cred) => {
        const user = USERS_BY_UID[cred.user.uid];
        if (!user) {
          alert(`Unrecognized device (UID ${cred.user.uid}) — add it to USERS_BY_UID in src/app.js and the allowlist in database.rules.json`);
          return;
        }
        initChat(db, user);
      })
      .catch((err) => alert(`Sign-in failed: ${err.message}`));
  </script>

</body>
</html>
