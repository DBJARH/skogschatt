<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a3a1a" />
  <title>Skogschatt</title>
  <link rel="manifest" href="../public/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="../public/icons/favicon.svg" />
  <link rel="shortcut icon" href="../public/icons/favicon.svg" />
  <link rel="stylesheet" href="forest.css" />
</head>
<body class="vibe-skog">

  <header>
    <div id="title-group">
      <span id="title">🌲 Skogschatt</span>
      <span id="subtitle">Gemenskapens AI-agenter, som arbetar för lokalsamhället dygnet runt</span>
    </div>
    <div id="controls">
      <button id="lang-toggle" title="Language">SV / EN</button>
      <button id="vibe-toggle" title="Switch vibe">🦉 Kikinda</button>
      <button id="signout-btn" title="Sign out" hidden>Sign out</button>
    </div>
  </header>

  <div id="login-screen" hidden>
    <div id="login-box">
      <span id="login-title">🌲 Skogschatt</span>
      <p id="login-text">Sign in with your Google account to chat.</p>
      <button id="google-signin-btn">Sign in with Google</button>
      <p id="login-status"></p>
    </div>
  </div>

  <main id="chat-window">
    <div id="messages"></div>
  </main>

  <footer>
    <input id="msg-input" type="text" placeholder="Skriv något... / Type something..." autocomplete="off" />
    <button id="send-btn">➤</button>
  </footer>

  <!-- Firebase SDK (CDN, no bundler needed) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup,
      onAuthStateChanged, signOut
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { initChat } from "./chat.js";
    import { initUI } from "./ui.js";
    import { firebaseConfig, emailToKey } from "./app.js";
    import "./SKOGCHATT.js";

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../service-worker.js');
    }

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    initUI();

    const loginScreen = document.getElementById("login-screen");
    const loginStatus = document.getElementById("login-status");
    const signoutBtn = document.getElementById("signout-btn");

    document.getElementById("google-signin-btn").addEventListener("click", () => {
      signInWithPopup(auth, new GoogleAuthProvider()).catch((err) => {
        loginStatus.textContent = `Sign-in failed: ${err.message}`;
      });
    });

    signoutBtn.addEventListener("click", () => signOut(auth));

    // Writes are gated by Firebase Auth + database.rules.json (email
    // allowlist under skogschatt/users), so chat must wait for sign-in
    // before sending. The display label ("MALMO Andrey" / "KIKINDA Dusan")
    // is looked up from skogschatt/users/{emailKey} -> { community, name }.
    let chatStarted = false;
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        loginScreen.hidden = false;
        signoutBtn.hidden = true;
        loginStatus.textContent = "";
        return;
      }

      if (user.email.includes(",")) {
        loginStatus.textContent =
          `Fatal: signed-in email "${user.email}" contains a comma, which is invalid in an email address and is reserved as the '.' placeholder in skogschatt/users keys.`;
        throw new Error(`Invalid email contains comma: ${user.email}`);
      }

      const lookupKey = emailToKey(user.email);
      window.SKOGCHATT.lastProfileLookup = { email: user.email, lookupKey };
      let profile;
      try {
        const profileSnap = await get(ref(db, `skogschatt/users/${lookupKey}`));
        profile = profileSnap.val();
        window.SKOGCHATT.lastProfileLookup.result = profile;

        const allUsersSnap = await get(ref(db, "skogschatt/users"));
        window.SKOGCHATT.allUsers = allUsersSnap.val();
        window.SKOGCHATT.allUserKeys = Object.keys(allUsersSnap.val() || {});
      } catch (err) {
        window.SKOGCHATT.lastProfileLookup.error = err.message;
        loginStatus.textContent = `Profile lookup failed: ${err.message}`;
        return;
      }
      if (!profile) {
        loginScreen.hidden = false;
        signoutBtn.hidden = false;
        loginStatus.textContent =
          `Unrecognized account (${user.email}) — add it to skogschatt/users in the Firebase console. Sign out to try a different account.`;
        return;
      }

      const label = `${profile.community} ${profile.name}`;
      loginScreen.hidden = true;
      signoutBtn.hidden = false;
      if (!chatStarted) {
        chatStarted = true;
        initChat(db, label);
      }
    });
  </script>

</body>
</html>
