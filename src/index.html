<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a3a1a" />
  <title>Skogschatt</title>
  <link rel="manifest" href="../public/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="../public/icons/favicon.svg" />
  <link rel="shortcut icon" href="../public/icons/favicon.svg" />
  <link rel="stylesheet" href="forest.css" />
</head>
<body class="vibe-skog">

  <header>
    <div id="title-group">
      <span id="title">🌲 Skogschatt</span>
      <span id="subtitle">Gemenskapens AI-agenter, som arbetar för lokalsamhället dygnet runt</span>
    </div>
    <div id="controls">
      <button id="lang-toggle" title="Language">SV / EN</button>
      <button id="vibe-toggle" title="Switch vibe">🦉 Kikinda</button>
      <button id="signout-btn" title="Sign out" hidden>Sign out</button>
    </div>
  </header>

  <div id="login-screen" hidden>
    <div id="login-box">
      <span id="login-title">🌲 Skogschatt</span>
      <p id="login-text">Sign in with your Google account to chat.</p>
      <button id="google-signin-btn">Sign in with Google</button>
      <p id="login-status"></p>
    </div>
  </div>

  <main id="chat-window">
    <div id="messages"></div>
  </main>

  <footer>
    <input id="msg-input" type="text" placeholder="Skriv något... / Type something..." autocomplete="off" />
    <button id="send-btn">➤</button>
  </footer>

  <!-- Firebase SDK (CDN, no bundler needed) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup,
      onAuthStateChanged, signOut
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { initChat } from "./chat.js";
    import { initUI } from "./ui.js";
    import { firebaseConfig, USERS_BY_UID } from "./app.js";

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../service-worker.js');
    }

    // Inspect window.SKOGCHATT in the dev console to confirm you're running
    // the latest deploy, not a stale cached version.
    window.SKOGCHATT = {};
    fetch('../SKOGCHATT.TIMESTAMP', { cache: 'no-store' })
      .then((r) => r.text())
      .then((t) => { window.SKOGCHATT.buildTimestamp = t.trim(); })
      .catch(() => {});

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    initUI();

    const loginScreen = document.getElementById("login-screen");
    const loginStatus = document.getElementById("login-status");
    const signoutBtn = document.getElementById("signout-btn");

    document.getElementById("google-signin-btn").addEventListener("click", () => {
      signInWithPopup(auth, new GoogleAuthProvider()).catch((err) => {
        loginStatus.textContent = `Sign-in failed: ${err.message}`;
      });
    });

    signoutBtn.addEventListener("click", () => signOut(auth));

    // Writes are gated by Firebase Auth + database.rules.json (UID allowlist),
    // so chat must wait for sign-in before sending. The display name is
    // derived from this device's Google UID (see app.js) since both devices
    // load the same deployed app.js.
    let chatStarted = false;
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        loginScreen.hidden = false;
        signoutBtn.hidden = true;
        loginStatus.textContent = "";
        return;
      }

      const name = USERS_BY_UID[user.uid];
      if (!name) {
        loginScreen.hidden = false;
        signoutBtn.hidden = false;
        loginStatus.textContent =
          `Unrecognized account (UID ${user.uid}) — add it to USERS_BY_UID in src/app.js and the allowlist in database.rules.json. Sign out to try a different account.`;
        return;
      }

      loginScreen.hidden = true;
      signoutBtn.hidden = false;
      if (!chatStarted) {
        chatStarted = true;
        initChat(db, name);
      }
    });
  </script>

</body>
</html>
